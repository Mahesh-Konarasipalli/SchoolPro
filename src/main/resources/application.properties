spring.application.name=school_api
# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/school_db?createDatabaseIfNotExist=true
spring.datasource.username=DATABASE USERNAME
spring.datasource.password=DATABASE PASSWORD
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Email Configuration
spring.mail.host=MAIL HOST
spring.mail.port=MAIL PORT
spring.mail.username=YOUR/ORGANIZETION EMAIL
# NOTE: You cannot use your normal Gmail password here. You must generate a 16-letter "App Password" in your Google Account Security settings.
spring.mail.password=MAIL PASSWORD
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

