<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{admin.profile.page.title}">SchoolPro | Admin Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <script>
        const savedTheme = localStorage.getItem('color-theme');
        const currentHour = new Date().getHours();
        const isNightTime = currentHour >= 18 || currentHour < 6;
        if (savedTheme === 'dark' || (!savedTheme && isNightTime)) { document.documentElement.classList.add('dark'); } 
        else { document.documentElement.classList.remove('dark'); }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-slate-50 dark:bg-slate-900 transition-colors duration-300 min-h-screen text-slate-800 dark:text-slate-200 p-6 lg:p-10">

    <div class="max-w-4xl mx-auto flex justify-between items-center mb-10">
        <a th:href="@{/admin/dashboard}" class="flex items-center gap-2 text-indigo-600 dark:text-indigo-400 font-bold hover:underline">
            <i class="ph-bold ph-arrow-left"></i> <span th:text="#{admin.profile.nav.back}">Back to Dashboard</span>
        </a>
        <h1 class="text-3xl font-bold" th:text="#{admin.profile.heading}">Admin Profile</h1>
        
        <div class="flex items-center gap-3">
           <div class="relative group z-50">
                <button class="bg-white dark:bg-slate-800 text-slate-500 dark:text-amber-400 p-3 rounded-full shadow-md border border-slate-200 dark:border-slate-700 hover:scale-110 transition-transform flex items-center justify-center">
                    🌐
                </button>
                <div class="absolute right-0 mt-2 w-48 bg-white dark:bg-slate-800 rounded-xl shadow-xl border border-slate-100 dark:border-slate-700 opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-300 overflow-hidden">
                    
                    <a href="?lang=en" class="block px-4 py-3 text-sm font-bold text-slate-700 dark:text-slate-200 hover:bg-indigo-50 dark:hover:bg-slate-700 transition-colors">
                        🇬🇧 English
                    </a>
                    
                    <a href="?lang=hi" class="block px-4 py-3 text-sm font-bold text-slate-700 dark:text-slate-200 hover:bg-indigo-50 dark:hover:bg-slate-700 transition-colors">
                        🇮🇳 हिन्दी (Hindi)
                    </a>
                    
                    <a href="?lang=te" class="block px-4 py-3 text-sm font-bold text-slate-700 dark:text-slate-200 hover:bg-indigo-50 dark:hover:bg-slate-700 transition-colors">
                        🇮🇳 తెలుగు (Telugu)
                    </a>
                    
                    <a href="?lang=mr" class="block px-4 py-3 text-sm font-bold text-slate-700 dark:text-slate-200 hover:bg-indigo-50 dark:hover:bg-slate-700 transition-colors">
                        🇮🇳 मराठी (Marathi)
                    </a>
                    
                    <a href="?lang=ta" class="block px-4 py-3 text-sm font-bold text-slate-700 dark:text-slate-200 hover:bg-indigo-50 dark:hover:bg-slate-700 transition-colors">
                        🇮🇳 தமிழ் (Tamil)
                    </a>
                    
                    <a href="?lang=kn" class="block px-4 py-3 text-sm font-bold text-slate-700 dark:text-slate-200 hover:bg-indigo-50 dark:hover:bg-slate-700 transition-colors">
                        🇮🇳 ಕನ್ನಡ (Kannada)
                    </a>
                    
                    <a href="?lang=ml" class="block px-4 py-3 text-sm font-bold text-slate-700 dark:text-slate-200 hover:bg-indigo-50 dark:hover:bg-slate-700 transition-colors">
                        🇮🇳 മലയാളം (Malayalam)
                    </a>
                    
                </div>
            </div>

            <button id="theme-toggle" type="button" class="bg-white dark:bg-slate-800 text-slate-500 dark:text-amber-400 p-3 rounded-full shadow-md border border-slate-200 dark:border-slate-700 hover:scale-110 transition-transform">
                <i id="theme-toggle-dark-icon" class="ph-fill ph-moon hidden text-xl"></i>
                <i id="theme-toggle-light-icon" class="ph-fill ph-sun hidden text-xl"></i>
            </button>
        </div>
    </div>

    <div class="max-w-4xl mx-auto bg-white dark:bg-slate-800 rounded-3xl shadow-xl border border-slate-100 dark:border-slate-700 overflow-hidden">
        
        <div class="h-32 bg-gradient-to-r from-indigo-500 to-purple-600 w-full"></div>

        <div class="p-8 md:p-12 relative">
            
            <div th:if="${param.updated}" class="mb-6 p-4 bg-emerald-50 dark:bg-emerald-900/20 text-emerald-700 dark:text-emerald-400 rounded-xl flex items-center gap-2 border border-emerald-100 dark:border-emerald-800">
                <i class="ph-fill ph-check-circle text-xl"></i> <span th:text="#{admin.profile.msg.success}">Profile updated successfully!</span>
            </div>

            <form th:action="@{/admin/update-profile}" method="post" enctype="multipart/form-data" class="space-y-8">
                
                <div class="flex flex-col md:flex-row items-center gap-6 -mt-20 mb-8">
                    <div class="relative w-32 h-32 rounded-full border-4 border-white dark:border-slate-800 shadow-lg overflow-hidden bg-slate-100 dark:bg-slate-700 flex-shrink-0">
                        <img th:if="${admin.profilePhoto != null}" th:src="@{'/uploads/' + ${admin.profilePhoto}}" class="w-full h-full object-cover" alt="Profile Photo">
                        <div th:unless="${admin.profilePhoto != null}" class="w-full h-full flex items-center justify-center text-4xl text-slate-400">
                            <i class="ph-fill ph-user"></i>
                        </div>
                    </div>
                    <div class="pt-12 md:pt-16 w-full text-center md:text-left">
                        <label class="block text-sm font-semibold mb-2" th:text="#{admin.profile.label.photo}">Change Profile Picture</label>
                        <input type="file" name="profileImage" accept="image/png, image/jpeg" 
                               class="block w-full text-sm text-slate-500 dark:text-slate-400 file:mr-4 file:py-2.5 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100 dark:file:bg-indigo-900/30 dark:file:text-indigo-400 transition-all">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-semibold mb-2" th:text="#{admin.profile.label.name}">Full Name</label>
                        <input type="text" name="fullName" th:value="${admin.fullName}" required
                               class="w-full px-4 py-3 bg-slate-50 dark:bg-slate-900/50 rounded-xl border border-slate-200 dark:border-slate-700 focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold mb-2" th:text="#{admin.profile.label.email}">Email Address (Read Only)</label>
                        <input type="email" th:value="${admin.email}" disabled
                               class="w-full px-4 py-3 bg-slate-100 dark:bg-slate-900/80 text-slate-500 rounded-xl border border-slate-200 dark:border-slate-700 cursor-not-allowed outline-none">
                    </div>
                    <div class="md:col-span-2">
                        <label class="block text-sm font-semibold mb-2" th:text="#{admin.profile.label.phone}">Phone Number</label>
                        <input type="text" name="phoneNumber" th:value="${admin.phoneNumber}" placeholder="+91 98765 43210"
                               class="w-full px-4 py-3 bg-slate-50 dark:bg-slate-900/50 rounded-xl border border-slate-200 dark:border-slate-700 focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
                    </div>
                    <div class="md:col-span-2">
                        <label class="block text-sm font-semibold mb-2" th:text="#{admin.profile.label.bio}">Bio / Description</label>
                        <textarea name="bio" rows="4" th:placeholder="#{admin.profile.placeholder.bio}"
                                  class="w-full px-4 py-3 bg-slate-50 dark:bg-slate-900/50 rounded-xl border border-slate-200 dark:border-slate-700 focus:ring-2 focus:ring-indigo-500 outline-none transition-all" th:text="${admin.bio}"></textarea>
                    </div>
                </div>

                <div class="flex justify-end pt-4">
                    <button type="submit" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-8 rounded-xl shadow-lg shadow-indigo-200 dark:shadow-indigo-900/20 transition-all transform hover:-translate-y-0.5" th:text="#{admin.profile.btn.save}">
                        Save Changes
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        var themeToggleBtn = document.getElementById('theme-toggle');
        var themeToggleDarkIcon = document.getElementById('theme-toggle-dark-icon');
        var themeToggleLightIcon = document.getElementById('theme-toggle-light-icon');

        if (document.documentElement.classList.contains('dark')) {
            themeToggleLightIcon.classList.remove('hidden');
        } else { themeToggleDarkIcon.classList.remove('hidden'); }

        themeToggleBtn.addEventListener('click', function() {
            document.documentElement.classList.toggle('dark');
            var isDark = document.documentElement.classList.contains('dark');
            localStorage.setItem('color-theme', isDark ? 'dark' : 'light');
            if (isDark) {
                themeToggleDarkIcon.classList.add('hidden');
                themeToggleLightIcon.classList.remove('hidden');
            } else {
                themeToggleLightIcon.classList.add('hidden');
                themeToggleDarkIcon.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
