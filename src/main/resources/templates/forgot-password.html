<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SchoolPro | Forgot Password</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    
    <script>
        const savedTheme = localStorage.getItem('color-theme');
        const currentHour = new Date().getHours();
        const isNightTime = currentHour >= 18 || currentHour < 6; // 6 PM to 6 AM

        if (savedTheme === 'dark' || (!savedTheme && isNightTime)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-slate-50 dark:bg-slate-900 transition-colors duration-300 min-h-screen flex items-center justify-center p-4 selection:bg-indigo-200 dark:selection:bg-indigo-900/50 selection:text-indigo-900 dark:selection:text-indigo-200 relative overflow-x-hidden">

    <button id="theme-toggle" type="button" class="absolute top-6 right-6 bg-white dark:bg-slate-800 text-slate-500 dark:text-amber-400 p-3 rounded-full shadow-md border border-slate-200 dark:border-slate-700 hover:scale-110 transition-transform z-50">
        <i id="theme-toggle-dark-icon" class="ph-fill ph-moon hidden text-xl"></i>
        <i id="theme-toggle-light-icon" class="ph-fill ph-sun hidden text-xl"></i>
    </button>

    <div class="max-w-md w-full bg-white dark:bg-slate-800 rounded-3xl shadow-xl shadow-slate-200/50 dark:shadow-black/50 p-8 md:p-10 border border-slate-100 dark:border-slate-700 text-center relative overflow-hidden animate-in fade-in zoom-in-95 duration-500 transition-colors">
        
        <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-indigo-500 to-purple-500"></div>

        <div class="mx-auto w-16 h-16 bg-indigo-50 dark:bg-indigo-500/10 rounded-full flex items-center justify-center mb-6 transition-colors">
            <i class="ph-fill ph-envelope-open text-3xl text-indigo-500 dark:text-indigo-400"></i>
        </div>

        <h2 class="text-2xl font-bold text-slate-800 dark:text-white mb-2">Forgot Password?</h2>
        <p class="text-slate-500 dark:text-slate-400 font-medium text-sm mb-8">No worries! Enter your registered email address and we'll send you a secure link to reset it.</p>

        <div id="status-message" class="empty:hidden mb-6 text-left">
            <div th:if="${param.error}" class="p-4 bg-rose-50 dark:bg-rose-900/20 border border-rose-100 dark:border-rose-800 text-rose-700 dark:text-rose-400 rounded-xl font-medium flex items-center gap-3 shadow-sm mb-4 text-sm transition-colors">
                <i class="ph-fill ph-warning-circle text-xl"></i> Email address not found.
            </div>
            <div th:if="${param.success}" class="p-4 bg-emerald-50 dark:bg-emerald-900/20 border border-emerald-100 dark:border-emerald-800 text-emerald-700 dark:text-emerald-400 rounded-xl font-medium flex items-center gap-3 shadow-sm mb-4 text-sm transition-colors">
                <i class="ph-fill ph-check-circle text-xl"></i> Reset link sent! Check your inbox.
            </div>
        </div>

        <form th:action="@{/forgot-password}" method="post" class="space-y-6 text-left">
            <div>
                <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2 transition-colors">Email Address</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-400 dark:text-slate-500">
                        <i class="ph ph-envelope-simple text-lg"></i>
                    </span>
                    <input type="email" name="email" required placeholder="name@school.edu" 
                           class="w-full pl-11 pr-5 py-3.5 bg-slate-50 dark:bg-slate-900/50 rounded-xl border border-slate-200 dark:border-slate-700 focus:bg-white dark:focus:bg-slate-900 focus:border-indigo-500 dark:focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/10 dark:focus:ring-indigo-500/20 transition-all outline-none text-slate-800 dark:text-white placeholder-slate-400 dark:placeholder-slate-500">
                </div>
            </div>

            <button type="submit" 
                    class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-4 rounded-xl shadow-lg shadow-indigo-200 dark:shadow-indigo-900/50 transition-all duration-300 transform hover:-translate-y-0.5 active:translate-y-0 flex items-center justify-center gap-2">
                Send Reset Link <i class="ph-bold ph-paper-plane-right"></i>
            </button>
        </form>

        <div class="mt-8 pt-6 border-t border-slate-100 dark:border-slate-700 transition-colors">
            <a th:href="@{/login}" class="inline-flex items-center gap-2 text-sm font-bold text-slate-500 dark:text-slate-400 hover:text-indigo-600 dark:hover:text-indigo-400 transition-colors">
                <i class="ph-bold ph-arrow-left"></i> Back to secure login
            </a>
        </div>
    </div>

    <script>
        var themeToggleDarkIcon = document.getElementById('theme-toggle-dark-icon');
        var themeToggleLightIcon = document.getElementById('theme-toggle-light-icon');
        var themeToggleBtn = document.getElementById('theme-toggle');

        // Check if dark mode is active on load
        if (document.documentElement.classList.contains('dark')) {
            themeToggleLightIcon.classList.remove('hidden');
        } else {
            themeToggleDarkIcon.classList.remove('hidden');
        }

        themeToggleBtn.addEventListener('click', function() {
            document.documentElement.classList.toggle('dark');
            var isDark = document.documentElement.classList.contains('dark');
            localStorage.setItem('color-theme', isDark ? 'dark' : 'light');
            
            if (isDark) {
                themeToggleDarkIcon.classList.add('hidden');
                themeToggleLightIcon.classList.remove('hidden');
            } else {
                themeToggleLightIcon.classList.add('hidden');
                themeToggleDarkIcon.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
