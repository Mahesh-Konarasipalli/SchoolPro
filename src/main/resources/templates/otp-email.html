<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f8fafc; margin: 0; padding: 0; }
        .container { max-width: 600px; margin: 20px auto; background: #ffffff; border-radius: 24px; overflow: hidden; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .header { background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 50%, #db2777 100%); padding: 30px; text-align: center; color: white; }
        .content { padding: 40px; color: #334155; line-height: 1.6; text-align: center; }
        .otp-box { background: #f1f5f9; border: 2px dashed #cbd5e1; border-radius: 16px; padding: 20px; margin: 30px auto; max-width: 300px; font-size: 32px; font-weight: 900; letter-spacing: 8px; color: #4f46e5; }
        .footer { padding: 20px; text-align: center; color: #94a3b8; font-size: 12px; background: #f1f5f9; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>Verify Your Email</h2>
        </div>
        <div class="content">
            <p>Hello,</p>
            <p>To complete your <strong>SchoolPro</strong> registration, please enter the following 6-digit verification code on the screen:</p>
            
            <div class="otp-box" th:text="${otp}">123456</div>
            
            <p style="font-size: 14px; color: #64748b;">This code will expire in 10 minutes. If you did not request this, please ignore this email.</p>
        </div>
        <div class="footer">
            <p>&copy; 2026 SchoolPro Management System.</p>
        </div>
    </div>
</body>
</html>
